<section id="slide-{{ID}}">
  <h2>{{TITLE}}</h2>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center;">
    <div>
      <p>{{POINT_1}}</p>
      <p>{{POINT_2}}</p>
      <p>{{POINT_3}}</p>
    </div>
    <div>
      <img src="{{IMAGE_PATH}}" style="max-height: 55vh; max-width: 100%; object-fit: contain;" alt="{{ALT_TEXT}}">
    </div>
  </div>
  <aside class="notes">{{SPEAKER_NOTES}}</aside>
</section>
