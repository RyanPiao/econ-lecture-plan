<section id="slide-{{ID}}">
  <h2>{{TITLE}}</h2>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
    <div>
      <h3 style="font-size: 20pt; margin-bottom: 12px;">{{LEFT_HEADING}}</h3>
      <p>{{LEFT_CONTENT}}</p>
    </div>
    <div>
      <h3 style="font-size: 20pt; margin-bottom: 12px;">{{RIGHT_HEADING}}</h3>
      <p>{{RIGHT_CONTENT}}</p>
    </div>
  </div>
  <aside class="notes">{{SPEAKER_NOTES}}</aside>
</section>
