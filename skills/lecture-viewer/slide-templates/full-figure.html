<section id="slide-{{ID}}">
  <h2>{{TITLE}}</h2>
  <div style="text-align: center;">
    <img src="{{IMAGE_PATH}}" style="max-height: 65vh; max-width: 90vw; object-fit: contain;" alt="{{ALT_TEXT}}">
    <p class="footnote">{{CAPTION}}</p>
  </div>
  <aside class="notes">{{SPEAKER_NOTES}}</aside>
</section>
